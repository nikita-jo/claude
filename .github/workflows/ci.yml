name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Dmaven.repo.local=.m2/repository'

jobs:
  # ────────────────────────── build ──────────────────────────
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify (compile + test)
        run: mvn -B verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7

  # ───────────────────── claude-review ──────────────────────
  # AI code review on every PR using Anthropic's official action.
  # Requires the ANTHROPIC_API_KEY secret in repo settings.
  claude-review:
    name: Claude code review
    runs-on: ubuntu-latest
    needs: build
    # Run on pull requests (the primary case) AND on direct pushes to
    # feature branches. Skip when pushing straight to main — there is no
    # PR diff to review against and the action would have nothing useful
    # to comment on. Branches named like 'main' or 'master' are excluded.
    # The Claude Code action only supports pull_request events — it has no
    # mode for posting review comments from a plain push. Pushes go straight
    # to deploy; review feedback is gated through PRs.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for correctness, security, and style.
            Focus on the diff against the base branch. Flag blockers, suggest
            non-blocking improvements inline. Do not modify code.

  # ──────────────── claude-review-main ────────────────
  # Post-merge review on main. The official action is PR-only, so this job
  # invokes the Claude Code CLI directly against the last commit's diff.
  # Findings are parsed from the agent's JSON; HIGH/CRITICAL fails the build.
  claude-review-main:
    name: Claude review (main)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude review on main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          DIFF=$(git diff HEAD~1...HEAD || true)
          if [ -z "$DIFF" ]; then
            echo "No diff to review (initial commit or empty change)."
            exit 0
          fi

          # Pipe the diff to claude -p with a strict output contract.
          # The agent MUST emit a single JSON line on stdout, then a summary.
          # Exit code 0 = pass, 1 = fail (HIGH/CRITICAL present).
          printf '%s' "$DIFF" | claude -p \
            --output-format json \
            --system-prompt "You are a strict code reviewer. Read the diff, identify issues, and emit ONE JSON object on stdout: {\"verdict\":\"pass|fail\",\"findings\":[{\"severity\":\"CRITICAL|HIGH|MEDIUM|LOW\",\"file\":\"...\",\"line\":N,\"description\":\"...\"}]}. verdict=fail if any finding is CRITICAL or HIGH. verdict=pass otherwise. Be conservative — false positives cost reviewer time, but missing a real bug costs more. Cite file:line for every finding. After the JSON, write a 3-5 line human summary to stderr." \
            "Review this diff for correctness, security, and style violations. Repository is at the current working directory. Here is the diff:"

      - name: Write report to step summary
        if: always()
        run: |
          {
            echo "## Claude review (main)"
            echo ""
            echo "Commit: ${GITHUB_SHA}"
            echo "Run:    ${GITHUB_RUN_ID}"
            echo ""
            echo "_See the previous step's output for the full report and verdict._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────── deploy ──────────────────────────
  # Runs only after a successful build + claude review, gated to main.
  # Each environment requires a manual approval in the GitHub UI.
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [build, claude-review, claude-review-main]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Note: `needs: claude-review` is satisfied when the job is skipped (skipped
    # == success for needs-resolution), so pushes straight to main still deploy.
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Deploy to staging
        run: |
          echo "Deploying $(ls target/*.jar) to staging"
          # Replace with the real deploy command, e.g.:
          #   aws s3 cp target/*.jar s3://staging-bucket/app.jar
          #   az webapp deploy --name staging-app --src-path target/*.jar

  deploy-prod:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [build, claude-review, claude-review-main, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Deploy to production
        run: |
          echo "Deploying $(ls target/*.jar) to production"
          # Replace with the real deploy command.
