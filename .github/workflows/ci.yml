name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Dmaven.repo.local=.m2/repository'

jobs:
  # ────────────────────────── build ──────────────────────────
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify (compile + test)
        run: mvn -B verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7

  # ───────────────────── claude-review ──────────────────────
  # AI code review on every PR using Anthropic's official action.
  # Requires the ANTHROPIC_API_KEY repo secret and the Claude Code
  # GitHub App to be installed on the repo.
  # PR-only: the action rejects push events with "Unsupported event type: push".
  claude-review:
    name: Claude code review
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for correctness, security, and style.
            Focus on the diff against the base branch. Flag blockers, suggest
            non-blocking improvements inline. Do not modify code.

            End your review with a single top-level PR comment in EXACTLY this format
            (replace the placeholders; do not include the angle-bracketed labels):

              ## Claude review summary
              **Verdict:** <✅ good to go | ❌ needs attention>
              **Findings:** <N total — X critical, Y high, Z medium, W low>

              <One short paragraph: either "No blocking issues found. Safe to merge."
              or "N blocking issues. See inline comments for details and recommended fixes.">

            Post that as a single PR comment (not as an inline review comment).
            Inline review comments on specific lines are still posted separately.

  # ───────────────────────── deploy ──────────────────────────
  # Runs only after a successful build + claude review, gated to main.
  # Each environment requires a manual approval in the GitHub UI.
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [build, claude-review]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Note: `needs: claude-review` is satisfied when the job is skipped (skipped
    # == success for needs-resolution), so pushes straight to main still deploy.
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Deploy to staging
        run: |
          echo "Deploying $(ls target/*.jar) to staging"
          # Replace with the real deploy command, e.g.:
          #   aws s3 cp target/*.jar s3://staging-bucket/app.jar
          #   az webapp deploy --name staging-app --src-path target/*.jar

  deploy-prod:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [build, claude-review, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Deploy to production
        run: |
          echo "Deploying $(ls target/*.jar) to production"
          # Replace with the real deploy command.
